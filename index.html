<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link rel="stylesheet" href="normalize.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="header__content">
      <h1 class="header__title">
        <span class="header__pokeball" aria-hidden="true"></span>
        Pokédex
      </h1>

      <form class="search" id="search-form">
        <input
          type="text"
          id="search-input"
          class="search__input"
          placeholder="Buscar Pokémon pelo nome ou número..."
          autocomplete="off"
        />
        <button type="submit" class="search__button" aria-label="Buscar">🔍</button>
        <button type="button" class="search__clear" id="clear-button" hidden>Limpar busca</button>
      </form>

      <div class="filters" id="type-filters">
        <button class="filter-chip filter-chip--active" data-type="all">Todos</button>
      </div>
    </div>
  </header>

  <main class="main">
    <p class="status" id="status-message" hidden></p>

    <ul class="pokemon-grid" id="pokemon-grid" aria-live="polite"></ul>

    <div class="loader" id="loader">
      <div class="loader__pokeball" aria-hidden="true"></div>
      <p>Carregando Pokémon...</p>
    </div>

    <button class="load-more" id="load-more-button">Carregar mais</button>
  </main>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal__close" id="modal-close" aria-label="Fechar">✕</button>
      <div class="modal__content" id="modal-content"></div>
    </div>
  </div>

  <footer class="footer">
    <p>
      Feito por Pedro Aruanã — Dados fornecidos pela
      <a href="https://pokeapi.co/" target="_blank" rel="noopener">PokéAPI</a>
    </p>
  </footer>

  <script src="pokeApi.js"></script>
  <script src="script.js"></script>
</body>
</html>
